<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" data-tauri-drag-region>
        <div class="brand-block">
          <div class="brand-mark">V</div>
          <div class="brand-copy">
            <h1>Victor</h1>
            <p>Desktop agent</p>
          </div>
        </div>

        <section class="runtime-panel" aria-label="Runtime status">
          <div class="runtime-item">
            <span class="runtime-dot"></span>
            <div>
              <span>Ollama</span>
              <strong>local host</strong>
            </div>
          </div>
          <div class="runtime-item">
            <span class="runtime-dot web"></span>
            <div>
              <span>Routing</span>
              <strong>auto web</strong>
            </div>
          </div>
          <div class="runtime-item">
            <span class="runtime-dot think"></span>
            <div>
              <span>Thinking</span>
              <strong id="think-status">off</strong>
            </div>
          </div>
          <div class="runtime-item">
            <span class="runtime-dot memory"></span>
            <div>
              <span>Memory</span>
              <strong id="memory-status">loading</strong>
            </div>
          </div>
        </section>

        <section class="quick-actions" aria-label="Quick prompts">
          <button class="quick-action" type="button" data-prompt="What should I test next for Victor?">
            <span>Next test</span>
            <small>Workflow</small>
          </button>
          <button class="quick-action" type="button" data-prompt="What is the best model choice for my GPU based on memory and web sources?">
            <span>Model fit</span>
            <small>Hardware</small>
          </button>
          <button class="quick-action" type="button" data-prompt="Summarize my current Victor memory and benchmarks.">
            <span>Memory summary</span>
            <small>Context</small>
          </button>
        </section>

        <div class="sidebar-footer">
          <button id="new-chat-button" class="secondary-button quiet" type="button">New chat</button>
          <button id="memory-button" class="secondary-button" type="button">View memory</button>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar" data-tauri-drag-region>
          <div class="title-stack">
            <span class="eyebrow">Victor</span>
            <h2>Agent chat</h2>
          </div>
          <div class="status-strip" aria-label="Agent capabilities">
            <div class="status-chip">
              <span class="chip-dot"></span>
              <span>Local first</span>
            </div>
            <div class="status-chip">
              <span class="chip-dot web"></span>
              <span>Web aware</span>
            </div>
            <div class="status-chip">
              <span class="chip-dot memory"></span>
              <span>Memory on</span>
            </div>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <section class="empty-state" id="empty-state">
            <div class="empty-panel">
              <div class="empty-kicker">Ready</div>
              <h3>Ask Victor</h3>
              <div class="prompt-pills" aria-label="Starter prompts">
                <button type="button" data-prompt="What should I improve next in Victor?">Improve Victor</button>
                <button type="button" data-prompt="Explain the latest answer and challenge weak assumptions.">Discuss deeper</button>
                <button type="button" data-prompt="Compare my current model choices for this laptop.">Compare models</button>
              </div>
            </div>
          </section>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-shell">
            <textarea
              id="prompt"
              rows="2"
              placeholder="Ask Victor..."
              autocomplete="off"
            ></textarea>
            <div class="composer-toolbar">
              <div class="composer-meta">
                <span id="prompt-count">0</span>
                <span>characters</span>
              </div>
              <label class="think-toggle" title="Switch between daily non-thinking answers and deeper thinking requests">
                <input id="think-toggle" type="checkbox" />
                <span>Think</span>
              </label>
              <button id="send-button" type="submit" aria-label="Send message">
                <span>Send</span>
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <dialog id="memory-dialog">
      <form method="dialog">
        <header>
          <h2>Memory</h2>
          <button type="submit" aria-label="Close">Close</button>
        </header>
        <pre id="memory-content"></pre>
      </form>
    </dialog>

    <script src="./main.js" type="module"></script>
  </body>
</html>
